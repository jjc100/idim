<!-- templates/index.html -->
{% extends "base.html" %}

{% block title %}IDIM{% endblock %}

{% block content %}
<div class="text-center">
    <h1 class="mb-4 text-primary">Immich Docker Image Manager</h1>
    <p>현재 설치된 Immich Docker 이미지와 최신 릴리즈 정보를 확인하고 관리하세요.</p>

    <div class="alert alert-info mt-4">
    	<strong>현재 버전:</strong> {{ current_version }}<br>
    	<strong>최신 버전:</strong> <span data-field="latest_version">확인 중...</span><br>
	</div>

    <div id="warnings"></div>
    
    <div class="row g-3 mt-4">
        <div class="col-12 col-md-6">
            <button type="button" class="btn btn-primary btn-lg w-100" onclick="fetchData('/check_version', '최신 버전 확인', 'resultModal')">최신 버전 확인</button>
        </div>

        <div class="col-12 col-md-6">
            <button type="button" class="btn btn-update btn-lg w-100" onclick="fetchData('/check_containers', '컨테이너 확인', 'resultModal')">이미지 업데이트</button>
        </div>

        <div class="col-12 col-md-6">
            <button type="button" class="btn btn-primary btn-lg w-100" onclick="fetchData('/view_logs', 'Immich 로그 보기', 'logModal')">Immich 로그 보기</button>
        </div>

        <div class="col-12 col-md-6">
            <button type="button" class="btn btn-primary btn-lg w-100" onclick="fetchData('/help', '도움말', 'resultModal')">도움말</button>
        </div>
    </div>
</div>

<div class="modal fade" id="resultModal" tabindex="-1" aria-labelledby="resultModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="resultModalLabel">결과</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="resultContent">
        로딩 중...
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="logModal" tabindex="-1" aria-labelledby="logModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="logModalLabel">Immich 로그 보기</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="logContent">
        로딩 중...
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
      </div>
    </div>
  </div>
</div>
<div class="position-fixed bottom-0 start-0 p-2 version-info rounded-3 shadow-sm" 
     style="z-index: 1051; left:20px; bottom:20px;">
    <small>IDIM v1.12</small>
</div>
<script>
// 기존 스크립트에 추가
document.addEventListener('DOMContentLoaded', function() {
    // 버전 정보와 경고 비동기 로드
    fetch('/get_version_info')
        .then(response => response.json())
        .then(data => {
            // 최신 버전 정보 업데이트
            document.querySelector('[data-field="latest_version"]').textContent = data.latest_version;
            
            // 경고 메시지가 있으면 표시
            if (data.warnings && data.warnings.length > 0) {
                const warningsHtml = `
                    <div class="alert alert-warning mt-3">
                        <h5>릴리즈 경고</h5>
                        <div class="mb-1">
                            ${data.warnings.map(w => w).join('<br>')}
                        </div>
                        <small class="text-muted">
                            <a href="https://github.com/immich-app/immich/releases" 
                               target="_blank" 
                               class="text-decoration-none">전체 릴리즈 노트 확인</a>
                        </small>
                    </div>`;
                document.getElementById('warnings').innerHTML = warningsHtml;
            }
        });
});


async function fetchData(url, title, modalId) {
    const modal = document.getElementById(modalId);
    const modalTitle = modal.querySelector('.modal-title');
    const modalBody = modal.querySelector('.modal-body');

    const existingModal = bootstrap.Modal.getInstance(modal);
    if (existingModal) {
        existingModal.dispose();
        document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
    }

    modalTitle.textContent = title;
    modalBody.innerHTML = '<div class="text-center my-4"><div class="spinner-border"></div></div>';

    const modalInstance = new bootstrap.Modal(modal, {
        backdrop: 'static',
        keyboard: false
    });
    modalInstance.show();

    try {
        const response = await fetch(url, {
            method: url === '/update_project' ? 'POST' : 'GET'
        });
        const data = await response.text();
        
        modalBody.innerHTML = data;
        const scripts = modalBody.getElementsByTagName('script');
        Array.from(scripts).forEach(script => {
            const newScript = document.createElement('script');
            newScript.text = script.textContent;
            document.body.appendChild(newScript).remove();
        });
    } catch (error) {
        modalBody.innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
    }
}

function startUpdate() {
    const modal = bootstrap.Modal.getInstance(document.getElementById('resultModal'));
    if (modal) {
        modal.hide();
        document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
    }
    fetchData('/update_project', '업데이트 진행', 'resultModal');
}
</script>

<style>
.modal-header h5 { 
    margin-bottom: 0.5rem !important; 
}
.modal-body p { 
    margin-bottom: 0.5rem !important; 
}
.modal-backdrop { 
    z-index: 1040 !important; 
}
</style>
{% endblock %}
