<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{% block title %}Immich Docker Image Manager{% endblock %}</title>
    
    <!-- Favicon -->
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- 기존 내용 아래에 CSS 인라인 추가 -->
    <style>
        body.light-mode { background: #F8F9FA; color: #01257D; }
        body.dark-mode { background: #121212; color: #E0E0E0; }
    </style>
</head>
<body class="light-mode">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Immich Docker Image Manager</a>
            <!-- 다크 모드 토글 버튼 -->
            <button id="toggle-dark-mode" class="btn btn-outline-secondary ms-auto">다크 모드</button>
        </div>
    </nav>
    
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 다크 모드 스크립트 -->
    <!-- 기존 스크립트 전체 교체 -->
<script>
const toggleButton = document.getElementById('toggle-dark-mode');
const versionInfo = document.querySelector('.version-info');

// 테마 저장 함수
function saveThemeToStorage(isDarkMode) {
    localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
}

// 테마 초기화 함수
function initTheme() {
    const savedTheme = localStorage.getItem('theme');
    const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const isDark = savedTheme ? savedTheme === 'dark' : systemDark;

    document.body.classList.toggle('dark-mode', isDark);
    document.body.classList.toggle('light-mode', !isDark);
    versionInfo.classList.toggle('dark-mode', isDark);
    toggleButton.textContent = isDark ? '라이트 모드' : '다크 모드';
}

// 초기 테마 설정
initTheme();

// 버튼 클릭 이벤트
toggleButton.addEventListener('click', () => {
    const isDarkMode = !document.body.classList.contains('dark-mode');
    
    document.body.classList.toggle('dark-mode', isDarkMode);
    document.body.classList.toggle('light-mode', !isDarkMode);
    versionInfo.classList.toggle('dark-mode', isDarkMode);
    
    toggleButton.textContent = isDarkMode ? '라이트 모드' : '다크 모드';
    saveThemeToStorage(isDarkMode);
});

function forceRefresh() {
    fetch('/force_refresh')
        .then(response => response.text())
        .then(data => {
            document.getElementById('force-refresh-result').innerText = data;
            fetchCacheStatus();
        });
}

function fetchCacheStatus() {
    fetch('/cache_status')
        .then(response => response.json())
        .then(data => {
            const formatted = JSON.stringify(data, null, 2);
            document.getElementById('cache-status-result').innerText = formatted;
        });
}

function fetchRateLimit() {
    fetch('/rate_limit')
        .then(response => response.json())
        .then(data => {
            const formatted = JSON.stringify(data, null, 2);
            document.getElementById('rate-limit-result').innerText = formatted;
        });
}

function fetchBackupFiles() {
    fetch('/backup_files')
        .then(response => response.json())
        .then(data => {
            const select = document.getElementById('backup-file');
            select.innerHTML = '';
            data.forEach(file => {
                const option = document.createElement('option');
                option.value = file;
                option.textContent = file;
                select.appendChild(option);
            });
        });
}

// 백업 복원 폼 제출 처리
document.getElementById('restore-form').addEventListener('submit', function(event) {
    event.preventDefault();
    const formData = new FormData(event.target);
    fetch('/restore_backup', {
        method: 'POST',
        body: formData
    })
    .then(response => response.text())
    .then(data => {
        document.getElementById('restore-result').innerText = data;
    });
});

// 초기 데이터 로드
fetchRateLimit();
fetchCacheStatus();
fetchBackupFiles();

// 5분마다 데이터 자동 새로고침
setInterval(() => {
    fetchRateLimit();
    fetchCacheStatus();
    fetchBackupFiles();
}, 300000);
</script>


</body>
</html>
