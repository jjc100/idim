version: "3.9"

services:
  idim:
    image: sruinz/idim:latest
    container_name: idim-container
    ports:
      - "7838:7838"
    env_file:
      - .env  #  .env 파일에서 환경 변수 로드
    
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # 호스트의 Docker 소켓을 컨테이너에 마운트
      - /volume1/homes/jjc:/mnt/media/jjc/photo:rw
      - /volume1/homes/홍다미:/mnt/media/hdm/photo:rw
      - ./backup:/app/backups
    restart: always